<nav class="navbar">

    <div class="container navbar-container">

        <a routerLink="/" class="logo">
            Vignette Visions
        </a>

        <div class="desktop-nav">

            <div class="nav-links">
                <a routerLink="/gallery">Gallery</a>
                <a routerLink="/collections">Collections</a>
                <a routerLink="/about">About</a>
            </div>

            <div class="nav-actions">
                @if (authService.isAuthenticated()) {
                <a routerLink="/wishlist">
                    Wishlist
                </a>
                <a routerLink="/cart">
                    Cart
                </a>
                }

                @if (authService.isAuthenticated()) {
                <div class="profile-section">

                    <span class="user-name">
                        Hi, {{ authService.currentUser()?.firstName }}
                    </span>

                    <button class="profile-button" [matMenuTriggerFor]="profileMenu">

                        <span class="material-symbols-outlined">
                            account_circle
                        </span>

                    </button>

                </div>

                <mat-menu #profileMenu="matMenu">

                    <button mat-menu-item>

                        Profile

                    </button>

                    <button mat-menu-item (click)="logout()">

                        Logout

                    </button>

                </mat-menu>
                }

                @if (!authService.isAuthenticated()) {
                <a routerLink="/sign-in">
                    Sign In
                </a>
                }
            </div>

        </div>

        <button class="menu-btn" (click)="toggleMenu()">

            ☰

        </button>

    </div>

</nav>

<div class="mobile-menu" [class.open]="isMenuOpen">

    <button class="close-btn" (click)="toggleMenu()">

        ✕

    </button>

    <div class="mobile-links">

        <a routerLink="/gallery">Gallery</a>

        <a routerLink="/collections">Collections</a>

        <a routerLink="/about">About</a>

        <a routerLink="/wishlist">Wishlist</a>

        <button class="mobile-login-btn">
            Login
        </button>

    </div>

</div>
