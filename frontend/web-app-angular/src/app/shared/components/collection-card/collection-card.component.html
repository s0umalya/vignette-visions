<article class="collection-card">

  <img
    [src]="collection.coverImageUrl"
    [alt]="collection.title">

  <div class="collection-overlay"></div>

  <div class="collection-content">

    <p>
      Collection
    </p>

    <h3>
      {{ collection.title }}
    </h3>

    <span>
      {{ collection.subtitle }}
    </span>

  </div>

</article>
