<section class="featured-collections section">

  <div class="container">

    <h2 class="section-title">
      Featured Collections
    </h2>

    <div class="collections-grid">

      @for (
        collection of collections;
        track collection.id
      ) {

        <app-collection-card
          [collection]="collection">
        </app-collection-card>

      }

    </div>

  </div>

</section>
