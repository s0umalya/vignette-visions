<section class="gallery-page">

    <div class="container">

        <header class="gallery-header">

            <p class="gallery-label">
                Explore
            </p>

            <h1>
                Gallery
            </h1>

            <p class="gallery-description">
                A curated collection of photographs and visual stories.
            </p>

        </header>

        <div class="gallery-controls">

            <input type="text" placeholder="Search photographs..." (input)="onSearch($event)">

        </div>

        <div class="gallery-filters">

            <button class="filter-btn" [class.active]="selectedCollection === 'all'" (click)="setCollection('all')">

                All

            </button>

            @for (
            collection of collections;
            track collection.id
            ) {

            <button class="filter-btn" [class.active]="
        selectedCollection === collection.id
      " (click)="
        setCollection(collection.id)
      ">

                {{ collection.title }}

            </button>

            }

        </div>

        <app-photo-masonry-grid [photos]="filteredPhotos">
        </app-photo-masonry-grid>

    </div>

</section>
