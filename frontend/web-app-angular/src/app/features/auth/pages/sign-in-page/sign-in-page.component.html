<section class="sign-in-page">

  <div class="sign-in-card">

    <h1>Welcome Back</h1>

    <form
      [formGroup]="signInForm"
      (ngSubmit)="onSubmit()">

      <input
        type="email"
        placeholder="Email"
        formControlName="email">

      <input
        type="password"
        placeholder="Password"
        formControlName="password">

      <button type="submit">
        Sign In
      </button>

    </form>

    <div class="sign-up-link">

      <span>New to Vignette Visions?</span>

      <a routerLink="/sign-up">
        Create an account
      </a>

    </div>

  </div>

</section>
