<section class="wishlist-page">

    <div class="wishlist-header">

        <h1>Wishlist</h1>

        <p>

            {{ photos().length }}

            saved photograph(s)

        </p>

    </div>

    @if (photos().length > 0) {

        <app-photo-masonry-grid
            [photos]="photos()">
        </app-photo-masonry-grid>

    } @else {

        <div class="empty-state">

            <h2>
                No photographs saved yet
            </h2>

            <p>
                Explore the gallery and add your favourites.
            </p>

        </div>

    }

</section>
